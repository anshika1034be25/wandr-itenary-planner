<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wandr — Itinerary Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="bhoww.css" />
</head>
<body>

  <div id="notificationArea" aria-live="polite"></div>

  <div class="backgroundOrbs" aria-hidden="true">
    <div class="glowOrb glowOrb1"></div>
    <div class="glowOrb glowOrb2"></div>
    <div class="glowOrb glowOrb3"></div>
  </div>

  <header class="siteHeader">
    <div class="headerWrapper">
      <div class="logo">
        <span class="logoIcon">✦</span>
        <span class="logoText">wandr</span>
      </div>
      <nav class="headerControls">
        <div class="searchWrapper">
          <span class="searchIcon">⌕</span>
          <input type="search" id="searchField" class="searchBox" placeholder="Search plans..." aria-label="Search itinerary items" />
        </div>
        <button class="darkModeToggle" id="themeToggleButton" aria-label="Toggle theme" title="Toggle dark/light mode">
          <span class="themeIcon">☽</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="mainContainer">

    <section class="hero" aria-label="Page introduction">
      <p class="heroEyebrow">your world, planned</p>
      <h1 class="heroTitle">
        Drop your next<br />
        <em>adventure</em> here.
      </h1>
      <p class="heroSub">Add destinations, dates & vibes — all in one glassy spot.</p>
    </section>

    <section class="filterSection" aria-label="Filter by category">
      <div class="filterGroup" id="filterGroupContainer" role="group" aria-label="Category filters">
        <button class="filterChip filterChipActive" data-filter="all">✦ All</button>
        <button class="filterChip" data-filter="travel">✈ Travel</button>
        <button class="filterChip" data-filter="food">🍜 Food</button>
        <button class="filterChip" data-filter="stay">🏨 Stay</button>
        <button class="filterChip" data-filter="activity">🎭 Activity</button>
        <button class="filterChip" data-filter="shopping">🛍 Shopping</button>
        <button class="filterChip" data-filter="other">◎ Other</button>
      </div>
    </section>

    <div class="actionBar">
      <button class="primaryButton" id="addPlanButton" aria-haspopup="dialog">
        <span class="plusSign">+</span>
        <span>New Plan</span>
      </button>
      <p class="planStats" id="planCounter"></p>
    </div>

    <section class="planGrid" id="planGrid" aria-label="Itinerary cards"></section>

    <div class="emptyMessage" id="emptyStateMsg" hidden aria-live="polite">
      <div class="emptyIcon" aria-hidden="true">🗺️</div>
      <h2 class="emptyHeading">No plans yet</h2>
      <p class="emptyText">Your next adventure is one click away. Add a plan to get started.</p>
      <button class="emptyActionButton" id="emptyAddButton">+ Add your first plan</button>
    </div>

  </main>

  <div class="modalBackdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modalContainer">
      <div class="modalHeader">
        <h2 class="modalHeading" id="modalTitle">New Plan</h2>
        <button class="modalCloseButton" id="closeModalButton" aria-label="Close modal">✕</button>
      </div>

      <form class="modalForm" id="planForm" novalidate>
        <div class="formField">
          <label class="fieldLabel" for="destInput">Destination *</label>
          <input class="fieldInput" type="text" id="destInput" placeholder="e.g. Kyoto, Japan" required autocomplete="off" />
        </div>

        <div class="formField twoColumnLayout">
          <div>
            <label class="fieldLabel" for="startDateInput">From</label>
            <input class="fieldInput" type="date" id="startDateInput" />
          </div>
          <div>
            <label class="fieldLabel" for="endDateInput">To</label>
            <input class="fieldInput" type="date" id="endDateInput" />
          </div>
        </div>

        <div class="formField">
          <label class="fieldLabel" for="categorySelect">Category</label>
          <select class="fieldInput fieldSelect" id="categorySelect">
            <option value="travel">✈ Travel</option>
            <option value="food">🍜 Food</option>
            <option value="stay">🏨 Stay</option>
            <option value="activity">🎭 Activity</option>
            <option value="shopping">🛍 Shopping</option>
            <option value="other">◎ Other</option>
          </select>
        </div>

        <div class="formField">
          <label class="fieldLabel" for="notesInput">Notes / Vibes</label>
          <textarea class="fieldInput fieldTextarea" id="notesInput" placeholder="What's the plan? Any must-dos, bookings, or vibe checks..." rows="3"></textarea>
        </div>

        <div class="formButtons">
          <button type="button" class="cancelButton" id="cancelFormButton">Cancel</button>
          <button type="submit" class="saveButton" id="saveBtn">Save Plan ✦</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="siteFooter">
    <p>made with <span class="heart">♥</span> for explorers everywhere · wandr © 2025</p>
  </footer>

  <script src="khekhe.js"></script>
</body>
</html>
